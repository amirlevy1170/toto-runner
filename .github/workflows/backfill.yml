name: Backfill Historical Data

on:
  workflow_dispatch:

concurrency:
  group: toto-backfill
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Clone TotoGenerator
        run: |
          git clone https://x-access-token:${{ secrets.TOTO_PAT }}@github.com/orgreens21/TotoGenerator.git repo
          cd repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: repo/requirements.txt

      - name: Install dependencies
        run: pip install -r repo/requirements.txt

      - name: Create .env from secrets
        run: |
          cat > repo/.env << EOF
          API_SPORTS_KEY=${{ secrets.API_SPORTS_KEY }}
          EMAIL_SMTP_HOST=smtp.gmail.com
          EMAIL_SMTP_PORT=587
          EMAIL_SENDER=${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD=${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT=${{ secrets.EMAIL_RECIPIENT }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          TABPFN_TOKEN=${{ secrets.TABPFN_TOKEN }}
          EOF

      - name: Run backfill
        working-directory: repo
        run: python -m pipeline backfill

      - name: Commit DB to repo
        working-directory: repo
        run: |
          git add output/toto.db output/pipeline.log
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "Backfill historical data $(date -u +%Y-%m-%d)"
          git push
