name: Walk-Forward Parallel (Experimental)

# Runs after the existing serial Walk-Forward Daily Pipeline succeeds.
# Splits work per-league into a matrix and merges the shards. Outputs
# go to NEW folders so we can compare side-by-side with the serial run
# before any cutover. NO email is sent during this comparison phase.

on:
  workflow_run:
    workflows: ["Walk-Forward Daily Pipeline"]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: toto-walkforward-parallel
  cancel-in-progress: false

jobs:
  discover:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      leagues: ${{ steps.list.outputs.leagues }}
    steps:
      - name: Clone TotoGenerator
        run: |
          git clone --depth 1 https://x-access-token:${{ secrets.TOTO_PAT }}@github.com/orgreens21/TotoGenerator.git repo

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: List eligible leagues
        id: list
        working-directory: repo
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json, sqlite3
          conn = sqlite3.connect("file:output/toto.db?mode=ro", uri=True)
          rows = conn.execute(
              "SELECT DISTINCT league FROM league_features "
              "WHERE result IS NOT NULL AND date IS NOT NULL "
              "ORDER BY league"
          ).fetchall()
          conn.close()
          print(f"leagues={json.dumps([r[0] for r in rows])}")
          PY

  walkforward:
    needs: discover
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        league: ${{ fromJson(needs.discover.outputs.leagues) }}
    steps:
      - name: Clone TotoGenerator
        run: |
          git clone --depth 1 https://x-access-token:${{ secrets.TOTO_PAT }}@github.com/orgreens21/TotoGenerator.git repo

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: repo/requirements.txt

      - name: Install dependencies
        run: pip install -r repo/requirements.txt

      - name: Create .env
        run: |
          cat > repo/.env <<'ENVEOF'
          API_SPORTS_KEY=${{ secrets.API_SPORTS_KEY }}
          TABPFN_TOKEN=${{ secrets.TABPFN_TOKEN }}
          ENVEOF
          sed -i 's/^[[:space:]]*//' repo/.env

      - name: Run partial WF (single league)
        working-directory: repo
        run: |
          mkdir -p partial
          # Sanitize league name for filenames (slashes etc.)
          SAFE_LEAGUE="$(echo "${{ matrix.league }}" | tr '/ ' '__')"
          python -m pipeline_walkforward \
            --db output/toto.db \
            --leagues "${{ matrix.league }}" \
            --partial \
            --partial-output "partial/${SAFE_LEAGUE}.json" \
            --no-email
          echo "SAFE_LEAGUE=${SAFE_LEAGUE}" >> "$GITHUB_ENV"

      - name: Upload partial shard
        uses: actions/upload-artifact@v4
        with:
          name: wf-partial-${{ env.SAFE_LEAGUE }}
          path: repo/partial/${{ env.SAFE_LEAGUE }}.json
          retention-days: 7

  merge:
    needs: walkforward
    if: always() && needs.walkforward.result != 'cancelled'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Clone TotoGenerator
        run: |
          git clone https://x-access-token:${{ secrets.TOTO_PAT }}@github.com/orgreens21/TotoGenerator.git repo
          cd repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: repo/requirements.txt

      - name: Install dependencies
        run: pip install -r repo/requirements.txt

      - name: Download partial shards
        uses: actions/download-artifact@v4
        with:
          path: repo/partial
          pattern: wf-partial-*
          merge-multiple: true

      - name: List shards
        working-directory: repo
        run: ls -la partial/ || echo "(no shards directory)"

      - name: Merge partials
        working-directory: repo
        run: |
          python -m pipeline_walkforward.merge \
            --inputs partial/ \
            --output-dir output/walkforward_parallel/

      - name: Push results to TotoGenerator
        working-directory: repo
        run: |
          git add output/walkforward_parallel/
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "Walk-forward parallel pipeline update $(date -u +%Y-%m-%d)"
          git pull --rebase origin master || true
          git push

      - name: Sync to dashboard (separate folder)
        if: success()
        run: |
          if [ ! -f repo/output/walkforward_parallel/latest.json ]; then
            echo "No parallel walkforward output, skipping dashboard sync"
            exit 0
          fi
          git clone https://x-access-token:${{ secrets.DASHBOARD_TOKEN }}@github.com/amirlevy1170/toto-dashboard.git dash
          cd dash
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p public/data/walkforward_parallel
          cp ../repo/output/walkforward_parallel/*.json public/data/walkforward_parallel/ 2>/dev/null || true
          git add public/data/walkforward_parallel/
          git diff --staged --quiet && echo "Dashboard already up to date" && exit 0
          git commit -m "Update parallel WF predictions $(date -u +%Y-%m-%d)"
          git push
