name: Forms Daily Pipeline

on:
  schedule:
    - cron: '0 7 * * *'  # 10AM Israel time
  workflow_dispatch:

concurrency:
  group: toto-forms-pipeline
  cancel-in-progress: false

jobs:
  forms-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - name: Clone TotoGenerator
        run: |
          git clone https://x-access-token:${{ secrets.TOTO_PAT }}@github.com/orgreens21/TotoGenerator.git repo
          cd repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: repo/requirements.txt

      - name: Install dependencies
        run: pip install -r repo/requirements.txt

      - name: Create .env
        run: |
          cat > repo/.env << EOF
          API_SPORTS_KEY=${{ secrets.API_SPORTS_KEY }}
          TABPFN_TOKEN=${{ secrets.TABPFN_TOKEN }}
          EOF

      - name: Run forms pipeline
        working-directory: repo
        run: python scripts/forms_daily_pipeline.py --db output/toto.db

      - name: Push results
        working-directory: repo
        run: |
          git add output/toto.db output/forms_predictions.json
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "Forms pipeline update $(date -u +%Y-%m-%d)"
          git pull --rebase origin master || true
          git push
